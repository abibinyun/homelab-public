# Template: static
# Stack: Static HTML/CSS/JS served by Nginx

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=homelab-public_web"
      - "traefik.http.routers.{{PROJECT_SLUG}}-web.rule=Host(`{{WEB_DOMAIN}}`)"
      - "traefik.http.routers.{{PROJECT_SLUG}}-web.entrypoints=web"
      - "traefik.http.services.{{PROJECT_SLUG}}-web.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
    name: homelab-public_web
