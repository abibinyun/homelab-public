# Template: laravel
# Stack: Laravel (PHP-FPM + Nginx)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=pgsql
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - storage:/var/www/html/storage
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=homelab-public_web"
      - "traefik.http.routers.{{PROJECT_SLUG}}-app.rule=Host(`{{WEB_DOMAIN}}`)"
      - "traefik.http.routers.{{PROJECT_SLUG}}-app.entrypoints=web"
      - "traefik.http.services.{{PROJECT_SLUG}}-app.loadbalancer.server.port=80"

volumes:
  storage:

networks:
  traefik:
    external: true
    name: homelab-public_web
